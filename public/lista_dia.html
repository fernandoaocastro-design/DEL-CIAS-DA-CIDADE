<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista do Dia - Delícias da Cidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-slate-900 text-white w-64 flex-shrink-0 transition-all duration-300 flex flex-col">
            <!-- O conteúdo será injetado via utils.js (RenderSidebar) -->
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <main class="flex-1 overflow-y-auto bg-gray-50 p-8">
                <header class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-800">Lista de Itens do Dia</h2>
                        <p class="text-gray-500">Gestão de produção diária</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <!-- User Profile Injected by Utils.renderUserProfile() -->
                    </div>
                </header>

                <!-- Notification Panel -->
                <div id="notification-panel" class="hidden absolute right-20 top-16 w-80 bg-white rounded-lg shadow-xl border z-50 animate-fade-in-up">
                    <div class="p-3 border-b font-bold text-gray-700 flex justify-between items-center">
                        <span>Notificações</span>
                        <button onclick="Utils.toggleNotifications()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="max-h-64 overflow-y-auto"></div>
                </div>

                <!-- Content -->
                <div id="app-content">
                    <!-- Injected via JS -->
                    <div class="flex justify-center items-center h-64">
                        <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-lg mx-4 overflow-hidden transform transition-all scale-95 opacity-0">
            <div class="bg-gray-50 px-4 py-3 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-800 text-lg" id="modal-title">Título</h3>
                <button onclick="Utils.closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 max-h-[80vh] overflow-y-auto custom-scrollbar" id="modal-body"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <!-- Adicionado manipulador de erro (onerror) para diagnosticar falhas de arquivo -->
    <script src="js/lista_dia.js" onerror="window.scriptLoadError = true; console.error('FALHA FATAL: O navegador não conseguiu carregar js/lista_dia.js');"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof DailyListModule !== 'undefined') {
                DailyListModule.init();
            } else {
                const is404 = window.scriptLoadError;
                const msg = is404 
                    ? 'O arquivo <b>js/lista_dia.js</b> não foi encontrado (Erro 404).' 
                    : 'O arquivo foi carregado, mas contém erros de sintaxe que impediram a execução.';
                
                console.error('Erro Crítico:', msg);
                document.getElementById('app-content').innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-red-600"><i class="fas fa-bug text-4xl mb-4"></i><h3 class="text-xl font-bold">Falha no Módulo</h3><p>${msg}</p><p class="text-sm mt-2 text-gray-500">Verifique o Console (F12) para detalhes.</p></div>`;
            }
        });
    </script>
</body>
</html>
