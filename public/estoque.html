<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Kitchen OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="bg-slate-900 text-white w-64 flex-shrink-0 transition-all duration-300 flex flex-col">
            <!-- O conteúdo será injetado via utils.js (RenderSidebar) -->
        </aside>

        <!-- CONTENT WRAPPER -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <main class="flex-1 overflow-y-auto bg-gray-50 p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Controle de Estoque</h2>
                    <p class="text-gray-500">NutriCare - Gestão Centralizada de Insumos</p>
                </div>
                <div class="flex items-center gap-4">
                    <!-- User Profile Injected by Utils.renderUserProfile() -->
                </div>
            </header>

            <!-- Abas de Navegação do Módulo -->
            <div class="flex gap-4 mb-6 border-b pb-2">
                <button id="tab-dashboard" onclick="EstoqueModule.setTab('dashboard')" class="tab-btn px-4 py-2 font-bold text-yellow-600 border-b-2 border-yellow-500 transition">📊 Visão Geral</button>
                <button id="tab-produtos" onclick="EstoqueModule.setTab('produtos')" class="tab-btn px-4 py-2 text-gray-500 hover:text-gray-700 transition">📦 Produtos</button>
                <button id="tab-movimentacoes" onclick="EstoqueModule.setTab('movimentacoes')" class="tab-btn px-4 py-2 text-gray-500 hover:text-gray-700 transition">🚚 Movimentações</button>
                <button id="tab-fornecedores" onclick="EstoqueModule.setTab('fornecedores')" class="tab-btn px-4 py-2 text-gray-500 hover:text-gray-700 transition">🏭 Fornecedores</button>
                <button id="tab-recebidos" onclick="window.location.href='estoque.html?view=recebidos'" class="tab-btn px-4 py-2 text-gray-500 hover:text-gray-700 transition">📥 Itens Recebidos</button>
                <button id="tab-lista-pedidos" onclick="window.location.href='eventos.html?tab=compras&subtab=lista'" class="tab-btn px-4 py-2 text-indigo-600 hover:text-indigo-700 transition">Lista de Pedidos</button>
            </div>

            <div id="estoque-content">
                <div class="text-center py-20">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-yellow-500"></i>
                    <p class="mt-4 text-gray-500">Carregando estoque...</p>
                </div>
            </div>
            </main>

            <footer class="bg-white border-t p-4 text-center text-xs text-gray-500">
                &copy; 2024 Delícia da Cidade. Todos os direitos reservados. | Versão 1.0.0
            </footer>
        </div>
    </div>

    <!-- MODAL CONTAINER (Expandido para formulários maiores) -->
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center overflow-y-auto py-10">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl p-6 relative animate-fade-in-up my-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold text-gray-800" id="modal-title">Título</h3>
                <button onclick="Utils.closeModal()" class="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/itens_recebidos.js"></script>
    <script src="js/estoque.js"></script>
</body>
</html>
